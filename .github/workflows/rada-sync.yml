name: Rada TSK → Notion sync

on:
  schedule:
    - cron: "0 7 * * 1"   # щопонеділка о 07:00 UTC = 10:00 Kyiv (UTC+3)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r rada-tsk-to-notion/requirements.txt

      - name: Run sync
        run: python rada-tsk-to-notion/main.py
        env:
          NOTION_TOKEN:                ${{ secrets.RADA_NOTION_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          NOTION_DB_ID:                ${{ secrets.NOTION_DB_ID }}
          HONCHARENKO_PAGE_ID:         ${{ secrets.HONCHARENKO_PAGE_ID }}
          RADA_DRIVE_FOLDER_ID:        ${{ secrets.RADA_DRIVE_FOLDER_ID }}
