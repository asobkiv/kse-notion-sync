name: Sheets → Notion sync

on:
  schedule:
    - cron: "0 5 * * *"   # щодня о 05:00 UTC = 08:00 Kyiv (UTC+3)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r sheets-to-notion/requirements.txt

      - name: Run sync
        run: python sheets-to-notion/main.py
        env:
          NOTION_TOKEN:                ${{ secrets.SHEETS_NOTION_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEETS_SPREADSHEET_ID:       ${{ secrets.SHEETS_SPREADSHEET_ID }}
          SHEETS_DB_ID:                ${{ secrets.SHEETS_DB_ID }}
          SHEETS_TAB_NAME:             ${{ secrets.SHEETS_TAB_NAME }}
